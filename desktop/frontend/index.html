<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-me</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">agent&#8203;-me</div>
        <div class="status">
          <button id="sidebarToggle" class="toggle" title="Toggle sidebar">☰</button>
          <span id="provider" class="provider">…</span>
          <span id="dot" class="dot dot--pending" title="connecting"></span>
        </div>
      </header>

      <div class="body">
        <aside id="sidebar" class="sidebar hidden">
          <div class="sidebar-section">
            <div class="sidebar-head">
              <span>Conversations</span>
              <button id="newChat" class="mini-btn" title="New conversation">+ New</button>
            </div>
            <div id="chats" class="chats"></div>
          </div>
          <div class="sidebar-section tree-section">
            <div class="sidebar-head">Project (read-only)</div>
            <div id="tree" class="tree"></div>
          </div>
        </aside>

        <div class="content">
          <main id="log" class="log" aria-live="polite">
            <div class="empty" id="empty">
              Start a conversation. The kernel streams tokens and shows tool calls
              as they happen — the same API the CLI uses. Toggle
              <strong>Files</strong> to browse the workspace.
            </div>
          </main>

          <section id="preview" class="preview hidden">
            <div class="preview-head">
              <span id="previewName" class="preview-name"></span>
              <button id="previewClose" class="preview-close" title="Close">✕</button>
            </div>
            <pre id="previewBody" class="preview-body"></pre>
          </section>

          <form id="composer" class="composer">
            <textarea
              id="input"
              class="input"
              rows="1"
              placeholder="Message the agent…  (Enter to send, Shift+Enter for newline)"
              autocomplete="off"
            ></textarea>
            <button id="send" class="send" type="submit" disabled>Send</button>
          </form>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
